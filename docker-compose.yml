services:
  postgres:
    image: postgres:16-alpine
    container_name: codequest-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codequest
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codequest"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codequest?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-refresh-secret
      WEB_ORIGIN: http://localhost:5173
      PORT: 3333
    ports:
      - "3333:3333"

volumes:
  postgres-data:
